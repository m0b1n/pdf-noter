services:
  backend:
    build:
      context: ./backend
    container_name: pdf_backend
    environment:
      DATABASE_URL: sqlite:////app/data/pdfnoter.db
      PDF_DIR: /app/pdfs
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b
    volumes:
      - ./backend/pdfnoter.db:/app/data/pdfnoter.db
      - ./pdfs:/app/pdfs
    expose:
      - "8000"
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: pdf_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: pdf_ollama
    ports:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: pdf_ollama_init
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
      sleep 8 &&
      ollama pull qwen2.5:7b
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

volumes:
  ollama_data: