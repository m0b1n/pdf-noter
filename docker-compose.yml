services:
  backend:
    build:
      context: ./backend
    container_name: pdf_backend
    environment:
      DATABASE_URL: sqlite:////app/data/pdfnoter.db
      PDF_DIR: /app/pdfs
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:7b
    volumes:
      - ./backend/pdfnoter.db:/app/data/pdfnoter.db
      - ./pdfs:/app/pdfs
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: pdf_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped